name: Build IndiaCloud APK & EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant Gradle Permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
          android/app/build/outputs/apk/release/indiacloud.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: indiacloud-apk
          path: android/app/build/outputs/apk/release/indiacloud.apk
          retention-days: 90

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: windows
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Write-Host "npm install attempt $i of $maxAttempts"
            if (Test-Path node_modules) {
              Remove-Item -Recurse -Force node_modules
            }
            npm install --no-audit --no-fund
            if (Test-Path "node_modules\.bin\react-scripts.cmd") {
              Write-Host "Install verified: react-scripts is present."
              exit 0
            }
            Write-Host "Install did not produce react-scripts binary, retrying..."
            Start-Sleep -Seconds 5
          }
          Write-Error "npm install failed to produce a working node_modules after $maxAttempts attempts."
          exit 1

      - name: Build React
        working-directory: windows
        run: npm run build
        env:
          CI: false

      - name: Build Electron
        working-directory: windows
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem windows/dist -Filter *.exe | Select-Object -First 1
          Copy-Item $exe.FullName windows/dist/indiacloud.exe -Force

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: indiacloud-exe
          path: windows/dist/indiacloud.exe
          retention-days: 90

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: indiacloud-apk
          path: artifacts/apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: indiacloud-exe
          path: artifacts/exe

      - name: Summary
        run: |
          echo "=============================="
          echo " Build Finished Successfully "
          echo "=============================="
          ls -R artifacts
